name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "api_changed=true" >> $GITHUB_OUTPUT
            echo "worker_changed=true" >> $GITHUB_OUTPUT
            echo "nginx_changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          FILES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")

          api_changed=false
          worker_changed=false
          nginx_changed=false
          all_changed=false

          for file in $FILES; do
            case "$file" in
              api-service/*)
                api_changed=true
                ;;
              worker-service/*)
                worker_changed=true
                ;;
              nginx/*)
                nginx_changed=true
                ;;
              docker-compose.yml|.github/workflows/*)
                all_changed=true
                ;;
            esac
          done

          if [ "$all_changed" = true ]; then
            api_changed=true
            worker_changed=true
            nginx_changed=true
          fi

          echo "api_changed=$api_changed" >> $GITHUB_OUTPUT
          echo "worker_changed=$worker_changed" >> $GITHUB_OUTPUT
          echo "nginx_changed=$nginx_changed" >> $GITHUB_OUTPUT

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Make mvnw executable for api-service
        if: steps.changes.outputs.api_changed == 'true'
        working-directory: ./api-service
        run: chmod +x mvnw

      - name: Build api-service jar
        if: steps.changes.outputs.api_changed == 'true'
        working-directory: ./api-service
        run: ./mvnw clean package -DskipTests

      - name: Make mvnw executable for worker-service
        if: steps.changes.outputs.worker_changed == 'true'
        working-directory: ./worker-service
        run: chmod +x mvnw

      - name: Build worker-service jar
        if: steps.changes.outputs.worker_changed == 'true'
        working-directory: ./worker-service
        run: ./mvnw clean package -DskipTests

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Prepare EC2
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          set -e

          cd ~/spring_aws
          git pull origin main

          mkdir -p api-service/target
          mkdir -p worker-service/target
          EOF

      - name: Copy api-service jar to EC2
        if: steps.changes.outputs.api_changed == 'true'
        run: |
          scp \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -i ~/.ssh/ec2_key.pem \
            ./api-service/target/api-service-0.0.1-SNAPSHOT.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/spring_aws/api-service/target/api-service-0.0.1-SNAPSHOT.jar

      - name: Copy worker-service jar to EC2
        if: steps.changes.outputs.worker_changed == 'true'
        run: |
          scp \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -i ~/.ssh/ec2_key.pem \
            ./worker-service/target/worker-service-0.0.1-SNAPSHOT.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/spring_aws/worker-service/target/worker-service-0.0.1-SNAPSHOT.jar

      - name: Deploy changed services on EC2
        run: |
          SERVICES=""
          if [ "${{ steps.changes.outputs.api_changed }}" = "true" ]; then
            SERVICES="$SERVICES api-service"
          fi
          if [ "${{ steps.changes.outputs.worker_changed }}" = "true" ]; then
            SERVICES="$SERVICES worker-service"
          fi
          if [ "${{ steps.changes.outputs.nginx_changed }}" = "true" ]; then
            SERVICES="$SERVICES nginx"
          fi

          if [ -z "$SERVICES" ]; then
            echo "No deployable service changed."
            exit 0
          fi

          ssh \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
          set -e

          export JAVA_HOME=/usr/lib/jvm/java-17-amazon-corretto
          export PATH=\$JAVA_HOME/bin:\$PATH

          cd ~/spring_aws
          echo "Rebuilding services:$SERVICES"
          docker compose up --build -d $SERVICES
          EOF