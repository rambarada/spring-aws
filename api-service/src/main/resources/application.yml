server:
  port: 8080

spring:
  application:
    name: api-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/cloud_tasks}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: existing schema baseline

management:
  endpoints:
    web:
      exposure:
        include: health,info

aws:
  region: ${AWS_REGION:eu-north-1}
  sqs:
    queue-url: ${AWS_SQS_QUEUE_URL:https://sqs.eu-north-1.amazonaws.com/498713386924/worker_queue}
    dlq-url: ${AWS_SQS_DLQ_URL:https://sqs.eu-north-1.amazonaws.com/498713386924/worker_queue_dlq}
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:ram-cloud-task-bucket-123}